<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Web2Kindle — History</title>
  <link rel="stylesheet" href="options.css">
  <style>
    #search-input {
      width: 100%; box-sizing: border-box;
      padding: 8px 12px; font-size: 14px;
      border: 1px solid #e2e8f0; border-radius: 8px;
      outline: none; margin-bottom: 16px;
    }
    #search-input:focus { border-color: #2563eb; }
    .history-list { list-style: none; margin: 0; padding: 0; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f1f5f9;
    }
    .history-item:last-child { border-bottom: none; }
    .item-meta { flex: 1; min-width: 0; }
    .item-title {
      font-size: 13px; font-weight: 500; color: #111827;
      display: flex; align-items: center; gap: 5px;
    }
    .item-title-text {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0; flex: 1;
    }
    .item-title-text.clickable { cursor: pointer; }
    .item-title-text.clickable:hover { text-decoration: underline; }
    .btn-copy {
      flex-shrink: 0; background: none; border: none; padding: 1px 2px;
      color: #cbd5e1; cursor: pointer; line-height: 1; display: flex; align-items: center;
      border-radius: 3px;
    }
    .btn-copy:hover { color: #475569; background: #f1f5f9; }
    .item-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .item-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 12px; }
    .btn-resend {
      font-size: 11px; padding: 4px 10px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 5px; cursor: pointer;
    }
    .btn-resend:hover { opacity: 0.85; }
    .btn-delete {
      font-size: 11px; padding: 4px 8px;
      background: none; color: #d1d5db;
      border: 1px solid #e5e7eb; border-radius: 5px; cursor: pointer;
    }
    .btn-delete:hover { color: #ef4444; border-color: #ef4444; }
    #empty-state { text-align: center; color: #9ca3af; padding: 32px 0; font-size: 13px; }
    .badge-failed {
      font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
      color: #dc2626; background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 4px; padding: 1px 6px; margin-left: 6px;
      vertical-align: middle; cursor: default;
    }
    .history-item.failed .item-title { color: #6b7280; }
    .history-item.failed .btn-resend {
      background: #dc2626;
    }
    .history-item.failed .btn-resend:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web2Kindle History</h1>
    <input id="search-input" type="search" placeholder="Search by title, URL, or content…" autocomplete="off">
    <ul id="history-list" class="history-list"></ul>
    <p id="empty-state" class="hidden">No items yet. Send something to Kindle first.</p>
  </div>
  <script src="history-store.js"></script>
  <script src="history.js"></script>
</body>
</html>
